services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: unguealhealth
      MYSQL_USER: uh_user
      MYSQL_PASSWORD: uh_pass
    # Host port changed to 3307 to avoid conflicts with local MySQL
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Initialize database on first startup using the provided schema
      - ./backend/database_init.sql:/docker-entrypoint-initdb.d/00_database_init.sql:ro

  backend:
    build: ./backend
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=unguealhealth
      - DB_USER=uh_user
      - DB_PASS=uh_pass
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "8000:8000"
    command: sh -c "sh /var/www/backend/scripts/ensure_db.sh && php -S 0.0.0.0:8000 -t /var/www/backend"
    depends_on:
      - db

  ia:
    build: ./ia
    ports:
      - "8001:8001"
    volumes:
      - ./ia:/app

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend

volumes:
  db_data:
