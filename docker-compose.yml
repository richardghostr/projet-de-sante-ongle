services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: unguealhealth
      MYSQL_USER: uh_user
      MYSQL_PASSWORD: uh_pass
    # Host port changed to 3307 to avoid conflicts with local MySQL
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=unguealhealth
      - DB_USER=uh_user
      - DB_PASS=uh_pass
    ports:
      - "8000:8000"
    command: php -S 0.0.0.0:8000 -t /var/www/backend
    depends_on:
      - db

  ia:
    build: ./ia
    ports:
      - "8001:8001"
    volumes:
      - ./ia:/app

  frontend:
    image: node:18-alpine
    working_dir: /main
    volumes:
      - ./frontend:/main
    ports:
      - "3000:3000"
    command: sh -c "npx http-server -p 3000 ./ -c-1"

volumes:
  db_data:
